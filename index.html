<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cooling App</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="https://unpkg.com/@fortawesome/fontawesome-free@6.4.2/css/all.min.css">
    <style>
        body {
            background-color: #f3f4f6;
            padding: 1.5rem;
            font-family: sans-serif;
        }
        .m-card {
            max-width: 24rem;
            margin: 1.5rem auto 0;
            background-color: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .hdr {
            padding: 2.5rem;
            color: white;
            text-align: center;
            transition: background-color 0.5s;
        }
        .hdr-hot { background-color: #f97316; }
        .hdr-cool { background-color: #22c55e; }
        .hdr-neu { background-color: #3b82f6; }
        
        .cnt { padding: 1.5rem; }
        .p-bar-bg {
            width: 100%;
            background-color: #e5e7eb;
            height: 0.75rem;
            border-radius: 9999px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .p-bar-fill {
            background-color: #22c55e;
            height: 100%;
            transition: width 0.3s;
            width: 0%;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            margin-bottom: 1rem;
        }
        .btn-grp { display: flex; gap: 0.5rem; }
        .btn-p {
            flex: 1;
            background-color: #22c55e;
            color: white;
            padding: 1rem;
            border-radius: 1rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        .btn-r {
            padding: 0 1rem;
            background-color: #f3f4f6;
            color: #9ca3af;
            border-radius: 1rem;
            border: none;
            cursor: pointer;
        }
        .hist-box {
            margin-top: 1rem;
            border-top: 1px solid #f3f4f6;
            padding-top: 1rem;
        }
        .hist-list {
            max-height: 10rem;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.625rem;
        }
        .h-item {
            display: flex;
            justify-content: space-between;
            background-color: #f9fafb;
            padding: 0.5rem;
            border-radius: 0.25rem;
            margin-bottom: 0.5rem;
            border-left: 2px solid #4ade80;
        }
    </style>
</head>
<body>

    <div class="m-card">
        <div id="x1" class="hdr hdr-hot">
            <h1 id="x2" style="font-size: 1.5rem; font-weight: bold; text-transform: uppercase; margin: 0;">Hot Area</h1>
            <p id="x3" style="font-size: 0.75rem; opacity: 0.9; margin: 0.25rem 0 0;">Buildings trap heat</p>
            <div style="margin-top: 1rem;">
                <i id="x4" class="fa-solid fa-building" style="font-size: 3.75rem;"></i>
            </div>
        </div>

        <div class="cnt">
            <div class="p-bar-bg">
                <div id="x5" class="p-bar-fill"></div>
            </div>

            <div class="stat-row">
                <span style="font-size: 0.75rem; font-weight: bold; color: #9ca3af;">PROGRESS</span>
                <span id="x6" style="font-size: 1.875rem; font-weight: 900; color: #16a34a;">0</span>
            </div>

            <div class="btn-grp">
                <button onclick="go()" class="btn-p">
                    <i class="fa-solid fa-seedling"></i> PLANT
                </button>
                <button onclick="re()" class="btn-r">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </div>

            <div class="hist-box">
                <h2 style="font-size: 0.75rem; font-weight: bold; color: #9ca3af; text-transform: uppercase; margin-bottom: 0.75rem;">History</h2>
                <div id="xh" class="hist-list"></div>
            </div>
        </div>
    </div>

    <script>
        let n = parseInt(localStorage.getItem('pts')) || 0;
        let h = JSON.parse(localStorage.getItem('hst')) || [];
        
        let e1 = document.getElementById('x1');
        let e2 = document.getElementById('x2');
        let e3 = document.getElementById('x3');
        let e4 = document.getElementById('x4');
        let e5 = document.getElementById('x5');
        let e6 = document.getElementById('x6');
        let eh = document.getElementById('xh');

        function sv() {
            localStorage.setItem('pts', n);
            localStorage.setItem('hst', JSON.stringify(h));
            view();
        }

        function view() {
            e6.innerText = n;
            e5.style.width = Math.min(n * 10, 100) + "%";
            
            if (n >= 10) {
                e1.className = "hdr hdr-neu";
                e2.innerText = "NEUTRAL";
                e3.innerText = "Air is balanced";
                e4.className = "fa-solid fa-leaf";
            } else if (n >= 5) {
                e1.className = "hdr hdr-cool";
                e2.innerText = "COOLING";
                e3.innerText = "Nature is helping";
                e4.className = "fa-solid fa-tree";
            } else {
                e1.className = "hdr hdr-hot";
                e2.innerText = "Hot Area";
                e3.innerText = "Buildings trap heat";
                e4.className = "fa-solid fa-building";
            }

            eh.innerHTML = h.map((t, i) => `
                <div class="h-item">
                    <span><i class="fa-solid fa-check" style="color: #22c55e; margin-right: 0.25rem;"></i> ${t}</span>
                    <button onclick="del(${i})" style="color: #fca5a5; background: none; border: none; cursor: pointer;">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            `).reverse().join('');
        }

        function go() {
            n++;
            let d = new Date().toLocaleTimeString();
            h.push("Added at " + d);
            sv();
        }

        function del(i) {
            h.splice(i, 1);
            if (n > 0) n--;
            sv();
        }

        function re() {
            n = 0;
            h = [];
            sv();
        }

        view();
    </script>
</body>
</html>
